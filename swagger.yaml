openapi: 3.0.3
info:
  title: GitHub Release Notifier API
  description: Subscribe to email notifications about new GitHub repository releases
  version: 1.0.0

servers:
  - url: http://localhost:3001
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /subscriptions:
    post:
      summary: Create subscription
      tags: [Subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, repo]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                repo:
                  type: string
                  example: anthropics/anthropic-sdk-node
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          description: Validation error
        '409':
          description: Subscription already exists

  /subscriptions/{id}:
    get:
      summary: Get subscription by ID
      tags: [Subscriptions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Subscription found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '404':
          description: Subscription not found

    delete:
      summary: Delete subscription
      tags: [Subscriptions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Subscription deleted
        '404':
          description: Subscription not found

components:
  schemas:
    Subscription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        owner:
          type: string
        repo:
          type: string
        createdAt:
          type: string
          format: date-time
